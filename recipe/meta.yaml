{% set name = "array-record" %}
{% set version = "0.8.0a1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google/array_record/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 60d73cd0f038de7a1e8c376b143a5a148b85b1fc316569f4c73a33b8be3dbf80
  patches:
    - patches/0001-Fix-package-configuration-for-conda-build-compatibility.patch

build:
  number: 0
  skip: True  # [py<310]

requirements:
  build:
    - patch  # [unix]
    - m2-patch  # [win]
  host:
    - python
    - pip
    - wheel
  run:
    - python
    - absl-py
    - etils

test:
  imports:
    - array_record
  requires:
    - pip
  commands:
    - pip check

about:
  home: https://github.com/google/array_record
  summary: A file format that achieves a new frontier of IO efficiency
  description: |
    ArrayRecord is a new file format derived from Riegeli, achieving a new
    frontier of IO efficiency. We designed ArrayRecord to support parallel read,
    write, and random access by record index. ArrayRecord builds on top of Riegeli
    and supports the same compression algorithms.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  dev_url: https://github.com/google/array_record
  doc_url: https://github.com/google/array_record

extra:
  recipe-maintainers:
    - Jrice1317
